<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TodoList</title>
    <!-- Tailwind via CDN (good for small projects / learning) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-10">
      <h1 class="text-3xl font-bold tracking-tight mb-6 text-center">Todo List</h1>

      <div class="bg-slate-800/80 border border-slate-700 rounded-2xl shadow-xl p-5 mb-8">
        <form method="POST" class="flex flex-col gap-4 md:flex-row md:items-end">
          {% csrf_token %}
          <div class="flex-1">
            <label class="block text-sm font-medium mb-1" for="content">Task</label>
            <input
              id="content"
              type="text"
              name="content"
              placeholder="What do you need to do?"
              class="w-full rounded-lg border border-slate-600 bg-slate-900/60 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              required
            >
          </div>
          <div>
            <label class="block text-sm font-medium mb-1" for="priority">Priority</label>
            <select
              id="priority"
              name="priority"
              class="w-full rounded-lg border border-slate-600 bg-slate-900/60 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              required
            >
              <option value="" disabled selected>Select</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1" for="due_date">Due date</label>
            <input
              id="due_date"
              type="date"
              name="due_date"
              class="w-full rounded-lg border border-slate-600 bg-slate-900/60 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              required
            >
          </div>
          <div class="md:self-stretch flex items-end">
            <button
              type="submit"
              class="w-full md:w-auto inline-flex items-center justify-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium shadow hover:bg-indigo-500 transition-colors"
            >
              Add Task
            </button>
          </div>
        </form>
      </div>

      <div class="bg-slate-800/80 border border-slate-700 rounded-2xl shadow-xl overflow-hidden">
        <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
          <span class="text-sm font-semibold tracking-wide uppercase text-slate-300">
            Tasks
          </span>
          <span class="text-xs text-slate-400">
            {% if tasks %}{{ tasks|length }} item(s){% else %}No items{% endif %}
          </span>
        </div>

        <div class="divide-y divide-slate-700">
          {% for task in tasks %}
          <div class="flex flex-col md:flex-row md:items-center gap-3 px-4 py-3 hover:bg-slate-800/90">
            <div class="flex-1">
              <p class="text-sm font-medium">{{ task.content }}</p>
              <p class="text-xs text-slate-400 mt-1">
                Due: <span class="font-medium text-slate-200">{{ task.due_date }}</span>
              </p>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
              <span
                class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold
                {% if task.priority == 'High' %}bg-red-500/20 text-red-300 border border-red-500/40
                {% elif task.priority == 'Medium' %}bg-amber-500/20 text-amber-300 border border-amber-500/40
                {% else %}bg-emerald-500/20 text-emerald-300 border border-emerald-500/40{% endif %}"
              >
                {{ task.priority }}
              </span>
              <a
                href="{% url 'edit' task.pk %}"
                class="inline-flex items-center justify-center rounded-lg border border-slate-600 px-3 py-1.5 text-xs font-medium text-slate-100 hover:bg-slate-700/80 transition-colors"
              >
                Edit
              </a>
              <a
                href="{% url 'delete_task' task.pk %}"
                class="inline-flex items-center justify-center rounded-lg border border-rose-600/70 bg-rose-600/80 px-3 py-1.5 text-xs font-medium text-slate-50 hover:bg-rose-500 transition-colors"
              >
                Delete
              </a>
            </div>
          </div>
          {% empty %}
          <div class="px-4 py-8 text-center text-sm text-slate-400">
            No tasks yet. Add your first task above.
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </body>
</html>
